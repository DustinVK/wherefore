name: Validate plugin marketplace

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manifest JSON syntax
        run: |
          set -e
          echo "Checking marketplace.json..."
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          echo "Checking plugin.json..."
          python3 -m json.tool plugins/discussion-log/.claude-plugin/plugin.json > /dev/null
          echo "JSON OK"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin
        run: claude plugin validate ./plugins/discussion-log

      - name: Validate marketplace
        run: claude plugin validate .
